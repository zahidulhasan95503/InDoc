# Logging Configuration
logging.level.org.springframework=INFO
# Also log your own code's activity
logging.level.com.legal=INFO
# Save logs to a file so they aren't lost
logging.file.name=logs/welegal.log
# Automatically archive old logs when they reach 10MB
logging.logback.rollingpolicy.max-file-size=10MB

# How many connections can stay open at once (Default is 10)
spring.datasource.hikari.maximum-pool-size=15
# How long a user should wait for a connection before giving up (30 seconds)
spring.datasource.hikari.connection-timeout=30000
# Minimum number of connections to keep idle (ready to go)
spring.datasource.hikari.minimum-idle=5
# How long a connection can stay "awake" before being refreshed
spring.datasource.hikari.max-lifetime=1800000

# ==== Session Configuration
# Increase session timeout to 4 hours (240 minutes)
server.servlet.session.timeout=240m
server.servlet.session.cookie.max-age=240m