<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="base::layout(~{::section})">

<head>
	<meta charset="UTF-8">
	<title>Sign Up - InDoc Legal Solutions</title>
</head>

<body>
	<section class="signin-section">
		<div class="box-form mt-5 mb-5">
			<div class="left">
				<div class="overlay">
					<!-- Session Message Alert -->
					<div th:if="${session.message}" th:classappend="${session.message.type}"
						class="alert text-center mb-4" role="alert">
						<p th:text="${session.message.content}"></p>
						<th:block th:text="${@sessionHelper.removeMessageFromHelper()}"></th:block>
					</div>

					<h1 class="mb-4">Join InDoc Today</h1>
					<p class="lead">Create your account and start managing your legal documents with confidence.</p>

					<div class="mt-5">
						<h5 class="mb-3">What You'll Get</h5>
						<ul class="feature-list">
							<li><i class="fas fa-check-circle"></i>Creating Legal Documents</li>
							<li><i class="fas fa-check-circle"></i> Professional legal templates</li>
							<li><i class="fas fa-check-circle"></i> AI Powered ChatInput</li>
							<li><i class="fas fa-check-circle"></i> Nearby Documents Center</li>
						</ul>
					</div>
				</div>
			</div>

			<div class="right">
				<form novalidate action="" th:action="@{/register}" th:object="${users}" method="post">
					<h5 class="mb-4">Create Account</h5>

					<p class="text-muted mb-4">
						Already have an account? <a th:href="@{/login}" class="text-primary font-weight-bold">Sign in
							here</a>
					</p>

					<!-- Name Field -->
					<div class="form-group">
						<label for="Name" class="font-weight-bold">Full Name</label>
						<input type="text" name="Name" class="form-control"
							th:classappend="${#fields.hasErrors('Name')?'is-invalid':''}" id="Name"
							th:value="${users.Name}" placeholder="Enter your full name" required>
						<div class="invalid-feedback" th:each="e:${#fields.errors('Name')}" th:text="${e}"></div>
					</div>

					<!-- Phone Field -->
					<div class="form-group">
						<label for="Phone" class="font-weight-bold">Phone Number</label>
						<input type="text" class="form-control"
							th:classappend="${#fields.hasErrors('Phone')?'is-invalid':''}" id="Phone" name="Phone"
							th:value="${users.Phone}" placeholder="Enter your phone number" required>
						<div class="invalid-feedback" th:each="e:${#fields.errors('Phone')}" th:text="${e}"></div>
					</div>

					<!-- Email Field -->
					<div class="form-group">
						<label for="Email" class="font-weight-bold">Email Address</label>
						<input type="email" class="form-control" id="Email"
							th:classappend="${#fields.hasErrors('Email')?'is-invalid':''}" name="Email"
							th:value="${users.Email}" placeholder="Enter your email" required>
						<div class="invalid-feedback" th:each="e:${#fields.errors('Email')}" th:text="${e}"></div>
					</div>

					<!-- Gender Selection -->
					<div class="form-group">
						<label class="font-weight-bold d-block mb-2">Gender</label>
						<div class="form-check form-check-inline">
							<input class="form-check-input" type="radio" name="ismale" id="male" value="true" checked>
							<label class="form-check-label" for="male">Male</label>
						</div>
						<div class="form-check form-check-inline">
							<input class="form-check-input" type="radio" name="ismale" id="female" value="false">
							<label class="form-check-label" for="female">Female</label>
						</div>
					</div>

					<!-- Password Field -->
					<div class="form-group">
						<label for="Password" class="font-weight-bold">Password</label>
						<input type="password" class="form-control"
							th:classappend="${#fields.hasErrors('Password')?'is-invalid':''}" id="Password"
							name="Password" th:value="${users.Password}" placeholder="Create a strong password"
							required>
						<div class="invalid-feedback" th:each="e:${#fields.errors('Password')}" th:text="${e}"></div>
					</div>

					<!-- Agreement Checkbox -->
					<div class="form-group">
						<div class="form-check">
							<input type="checkbox" class="form-check-input" id="agreement"
								th:classappend="${#fields.hasErrors('agreement')?'is-invalid':''}" name="agreement"
								required>
							<label class="form-check-label" for="agreement">
								I agree to the Terms and Conditions</a>
							</label>
							<div class="invalid-feedback" th:each="e:${#fields.errors('agreement')}" th:text="${e}">
							</div>
						</div>
					</div>

					<!-- Submit Button -->
					<button type="submit" class="btn btn-primary btn-block btn-lg rounded-pill mt-3">
						Create Account <i class="fas fa-arrow-right ml-2"></i>
					</button>
				</form>
			</div>
		</div>
	</section>
</body>

</html>
