<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="normal/base::layout(~{::section})">

<head>
  <meta charset="UTF-8">
  <title>Update Profile - InDoc</title>
</head>

<body>
  <section class="py-5">
    <div class="container">
      <div class="row">
        <div class="col-lg-8 mx-auto">
          <div class="bg-white p-5 rounded shadow-sm">
            <div class="text-center mb-5">
              <i class="fas fa-user-edit fa-4x mb-3" style="color: #C5A059;"></i>
              <h1 class="font-weight-bold mb-3">Update Your Profile</h1>
              <p class="lead text-muted">Manage your account information</p>
            </div>
            <form th:action="@{/user/update_user}" method="post">
              <div class="form-group">
                <label class="font-weight-bold">Full Name</label>
                <input type="text" th:value="${users.Name}" name="name" class="form-control"
                  placeholder="Enter your name" required>
              </div>
              <div class="form-group">
                <label class="font-weight-bold">Email Address</label>
                <input type="email" th:value="${users.Email}" name="email" class="form-control"
                  placeholder="Enter your email" required>
              </div>
              <div class="form-group">
                <label class="font-weight-bold">Phone Number</label>
                <input type="tel" th:value="${users.Phone}" name="phone" class="form-control"
                  placeholder="Enter your phone" required>
              </div>
              <button type="submit" class="btn btn-primary btn-lg btn-block rounded-pill mt-4">
                <i class="fas fa-save mr-2"></i>Save Changes
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</body>

</html>
