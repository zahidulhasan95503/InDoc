<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{normal/base::layout(~{::section})}">

<head>
  <meta charset="UTF-8">
  <title th:text="${documentTitle} + ' Centres - InDoc'">Document Centres - InDoc</title>
</head>

<body>
  <section class="py-5">
    <div class="content text-center">

      <h2 style="text-align: center; font-size: 2.5rem; color: #FFD700; margin-bottom: 20px;" class="px-2">
        Know Your <span th:text="${documentTitle}"></span> Centers
      </h2>

      <div class="row mb-4 text-left px-4">
        <div class="col-12 text-center text-md-left">
          <a th:href="@{/user/document(type=${documentType})}" class="text-decoration-none"
            style="display:inline-block; margin-left: 20px; font-weight: 500;">
            <i class="fas fa-arrow-left mr-2"></i>Back to <span th:text="${documentTitle}"></span> Services
          </a>
        </div>
      </div>

      <!-- Centre Info Section (from the DB) -->
      <div id="centre-info-section" style="display:none; max-width: 1100px; margin: 0 auto;"
        class="text-left px-3 px-md-4 mb-4">
        <div class="row">
          <div class="col-md-4 mb-3">
            <div class="p-3 border rounded h-100 bg-white shadow-sm">
              <h6 class="font-weight-bold mb-2"><i class="fas fa-info-circle mr-2" style="color:#C5A059;"></i>Where to
                Go</h6>
              <p id="centreDescription" class="text-muted mb-0 small"></p>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <div class="p-3 border rounded h-100 bg-white shadow-sm">
              <h6 class="font-weight-bold mb-2"><i class="fas fa-phone mr-2" style="color:#C5A059;"></i>Contact Info
              </h6>
              <p id="contactInfo" class="text-muted mb-0 small"></p>
            </div>
          </div>
          <div class="col-md-4 mb-3">
            <div class="p-3 border rounded h-100 bg-white shadow-sm">
              <h6 class="font-weight-bold mb-2"><i class="fas fa-clock mr-2" style="color:#C5A059;"></i>Working Hours
              </h6>
              <p id="workingHours" class="text-muted mb-0 small"></p>
            </div>
          </div>
        </div>
      </div>

      <div class="container">
        <div id="map" style="height: 500px; width: 100%;"></div>
      </div>
      <br>

      <button class="btn btn-primary text-center" id="mylocation"
        style="padding: 10px 28px; font-size: 1rem; border-radius: 10px; margin-bottom: 2rem;">
        <i class="fas fa-crosshairs mr-2"></i>Get Current Location
      </button>
      <h4 hidden id="places" th:text="${places}"></h4>

      <!-- Place Cards Section -->
      <div id="place-cards-section" class="px-3 px-md-0"
        style="display:none; max-width:1100px; margin:2rem auto 0; text-align:left;">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem;">
          <div style="flex:1; height:2px; background:linear-gradient(to right,#C5A059,transparent);"></div>
          <h3 style="margin:0; font-size:1.4rem; font-weight:700; color:#0F172A; white-space:nowrap;">
            <i class="fas fa-map-marker-alt" style="color:#C5A059; margin-right:0.5rem;"></i>Nearby <span
              th:text="${documentTitle}"></span> Centres
          </h3>
          <div style="flex:1; height:2px; background:linear-gradient(to left,#C5A059,transparent);"></div>
        </div>

        <!-- Loading spinner -->
        <div id="cards-loading" style="text-align:center; padding:2rem;">
          <i class="fas fa-spinner fa-spin fa-2x" style="color:#C5A059;"></i>
          <p style="margin-top:0.8rem; color:#64748B; font-size:0.95rem;">Finding nearby centres…</p>
        </div>

        <!-- Card grid (JS will populate) -->
        <div id="place-cards-grid"
          style="display:grid; grid-template-columns:repeat(auto-fit, minmax(280px, 1fr)); gap:1.2rem;"></div>

        <!-- No results -->
        <div id="cards-empty" style="display:none; text-align:center; padding:2rem;
                                     background:#f9f7f4; border-radius:12px; border:1px dashed #C5A059;">
          <i class="fas fa-map-marker-alt"
            style="font-size:2rem; color:#C5A059; margin-bottom:0.6rem; display:block;"></i>
          <p style="margin:0; color:#555; font-weight:500;">No nearby centres found.</p>
        </div>
      </div>

      <script>
        var docTypeVal = "[[${documentType}]]";
        document.addEventListener("DOMContentLoaded", function () {
          var state = localStorage.getItem('selectedWelegalState');
          if (state) {
            fetch('/api/centre?state=' + encodeURIComponent(state) + '&type=' + encodeURIComponent(docTypeVal))
              .then(function (res) {
                if (res.ok) return res.json();
                throw new Error('Not found');
              })
              .then(function (centre) {
                // Inject information blocks
                document.getElementById('centreDescription').textContent = centre.centreDescription || '-';
                document.getElementById('contactInfo').textContent = centre.contactInfo || '-';
                document.getElementById('workingHours').textContent = centre.workingHours || '-';
                document.getElementById('centre-info-section').style.display = 'block';

                // Update the Map search keyword so mapsscript.js targets the exact state-specific office!
                if (centre.mapsSearchKeyword && centre.mapsSearchKeyword.trim() !== '') {
                  document.getElementById('places').textContent = centre.mapsSearchKeyword;
                }
              })
              .catch(function (e) {
                console.log("No explicit custom center info found for this state fallback to generic...");
              });
          }
        });
      </script>

      <script>
        (g => { var h, a, k, p = "The Google Maps JavaScript API", c = "google", l = "importLibrary", q = "__ib__", m = document, b = window; b = b[c] || (b[c] = {}); var d = b.maps || (b.maps = {}), r = new Set, e = new URLSearchParams, u = () => h || (h = new Promise(async (f, n) => { await (a = m.createElement("script")); e.set("libraries", [...r] + ""); for (k in g) e.set(k.replace(/[A-Z]/g, t => "_" + t[0].toLowerCase()), g[k]); e.set("callback", c + ".maps." + q); a.src = `https://maps.${c}apis.com/maps/api/js?` + e; d[q] = f; a.onerror = () => h = n(Error(p + " could not load.")); a.nonce = m.querySelector("script[nonce]")?.nonce || ""; m.head.append(a) })); d[l] ? console.warn(p + " only loads once. Ignoring:", g) : d[l] = (f, ...n) => r.add(f) && u().then(() => d[l](f, ...n)) })({
          key: "[[${googleMapsApiKey}]]",
          callback: "initmap",
          v: "weekly",
          // Use the 'v' parameter to indicate the version to use (weekly, beta, alpha, etc.).
          // Add other bootstrap parameters as needed, using camel case.
        });
      </script>

      <script type="text/javascript" th:src="@{/js/mapsscript.js}"></script>

    </div>
  </section>
</body>

</html>
